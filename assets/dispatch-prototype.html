<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0E0B08;
    --bg-2: #141019;
    --panel: #1A1511;
    --panel-2: #211A14;
    --line: #2E2620;
    --line-2: #3D332A;
    --cream: #F5EFE6;
    --cream-2: #C9BFB2;
    --muted: #8A7F72;
    --muted-2: #5F564C;
    --ember: #E8913C;
    --ember-hot: #FFA94D;
    --ember-soft: rgba(232,145,60,0.14);
    --green: #6FB98F;
    --shadow-lg: 0 24px 60px rgba(0,0,0,0.55), 0 8px 20px rgba(0,0,0,0.4);
    --shadow-md: 0 8px 28px rgba(0,0,0,0.4);
    --glow-ember: 0 0 40px rgba(232,145,60,0.35), 0 12px 30px rgba(0,0,0,0.5);
  }
  html, body { background: var(--bg); }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--cream);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .display { font-family: 'Space Grotesk', sans-serif; }
  ::selection { background: var(--ember); color: #1a1511; }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 5px; border: 2px solid var(--bg); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(20px);} to { opacity:1; transform:translateY(0);} }
  .fade-up { animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both; }
  .d1{animation-delay:.08s}.d2{animation-delay:.18s}.d3{animation-delay:.30s}.d4{animation-delay:.42s}

  @keyframes rowIn { 0%{opacity:0;transform:translateY(-14px) scale(.97)} 100%{opacity:1;transform:translateY(0) scale(1)} }
  .row-in { animation: rowIn 0.75s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes rowFlash { 0%{background:var(--ember-soft)} 100%{background:transparent} }
  .row-flash { animation: rowFlash 1.8s ease-out both; }

  @keyframes travel {
    0%{opacity:0;transform:translate(var(--ox),var(--oy)) scale(.96) rotate(-1.5deg)}
    12%{opacity:1;transform:translate(var(--ox),var(--oy)) scale(1) rotate(0)}
    45%{transform:translate(var(--mx),var(--my)) scale(.9) rotate(2.5deg)}
    82%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(.42) rotate(0)}
    100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.2)}
  }
  .travel { animation: travel 1.15s cubic-bezier(0.5,0,0.2,1) both; }

  @keyframes ring { 0%{opacity:.9;transform:scale(.3)} 100%{opacity:0;transform:scale(2.8)} }
  .ring { animation: ring 0.65s cubic-bezier(0.2,0.8,0.3,1) both; }

  @keyframes cardLift {
    0%{transform:translateY(0);box-shadow:var(--shadow-md);border-color:var(--line)}
    35%{transform:translateY(-7px);box-shadow:var(--glow-ember);border-color:var(--ember)}
    100%{transform:translateY(0);box-shadow:var(--shadow-md);border-color:var(--line)}
  }
  .card-lift { animation: cardLift 0.8s cubic-bezier(0.16,1,0.3,1) both; }

  @keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.45;transform:scale(.8)} }
  .live-pulse { animation: livePulse 1.9s ease-in-out infinite; }

  @keyframes flicker { 0%,100%{opacity:.96} 92%{opacity:.96} 94%{opacity:.82} 96%{opacity:.97} }
  .crt-flicker { animation: flicker 5s linear infinite; }

  .btn-press { transition: transform .18s cubic-bezier(0.2,0.8,0.3,1), background .2s ease, color .2s ease, box-shadow .2s ease; }
  .btn-press:hover { background: var(--cream) !important; color: #14100c !important; transform: scale(0.955); box-shadow: 0 0 28px rgba(245,239,230,0.28); }
  .btn-press:active { transform: scale(0.93); }

  .agent-card { transition: transform .3s cubic-bezier(0.16,1,0.3,1), box-shadow .3s, border-color .3s; }
  .agent-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--line-2); }

  .field { transition: border-color .2s, box-shadow .2s; }
  .field:focus-within { border-color: var(--ember); box-shadow: 0 0 0 4px var(--ember-soft); }

  .social { transition: transform .18s cubic-bezier(0.2,0.8,0.3,1), background .2s ease, color .2s ease, border-color .2s ease; }
  .social:hover { background: var(--cream); color: #14100c; border-color: var(--cream); transform: scale(0.92); }
  .social:active { transform: scale(0.86); }

  .hero-photo {
    filter: saturate(0.85) contrast(1.05);
    -webkit-mask-image: radial-gradient(ellipse 70% 80% at 70% 45%, #000 40%, transparent 78%);
    mask-image: radial-gradient(ellipse 70% 80% at 70% 45%, #000 40%, transparent 78%);
  }
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;
const IMG = window.__IMG;

const AGENTS = {
  verimath:{id:"verimath",name:"VeriMath",tag:"Computational verification",price:0.01,sla:"under 1 min",base:10,dot:"var(--ember)"},
  chainguard:{id:"chainguard",name:"ChainGuard",tag:"Smart-contract audit",price:0.10,sla:"under 5 min",base:43,dot:"var(--ember-hot)"},
};
function rid(){const c="0123456789abcdef";let o="";for(let i=0;i<6;i++)o+=c[Math.floor(Math.random()*16)];return o;}
function pickAgent(t){t=t.toLowerCase();return (t.includes("contract")||t.includes("audit")||t.includes("token")||t.includes("mint")||t.includes("scan")||t.includes("0x"))?"chainguard":"verimath";}
let seq=4000;

function Packet({packet,onArrive}){
  useEffect(()=>{const t=setTimeout(()=>onArrive(packet.id),1150);return()=>clearTimeout(t);},[]);
  const a=AGENTS[packet.agentId];
  const midX=(packet.origin.x+packet.target.x)/2, midY=Math.min(packet.origin.y,packet.target.y)-70;
  return (
    <div className="travel" style={{position:"fixed",left:0,top:0,zIndex:60,pointerEvents:"none",
      "--ox":packet.origin.x+"px","--oy":packet.origin.y+"px","--mx":midX+"px","--my":midY+"px","--tx":packet.target.x+"px","--ty":packet.target.y+"px"}}>
      <div className="display" style={{background:"var(--panel-2)",border:"1px solid var(--ember)",color:"var(--cream)",borderRadius:14,padding:"12px 16px",fontSize:13,fontWeight:500,boxShadow:"var(--glow-ember)",whiteSpace:"nowrap",maxWidth:300,overflow:"hidden",textOverflow:"ellipsis",display:"flex",alignItems:"center",gap:10}}>
        <span style={{width:8,height:8,borderRadius:"50%",background:a.dot,flexShrink:0}} />
        {packet.text}
      </div>
    </div>
  );
}
function Ring({point,color}){return <div className="ring" style={{position:"fixed",left:point.x,top:point.y,width:12,height:12,marginLeft:-6,marginTop:-6,borderRadius:"50%",border:`2.5px solid ${color}`,zIndex:55,pointerEvents:"none"}} />;}

function AgentCard({agent,orders,liftKey,cardRef}){
  return (
    <div ref={cardRef} key={liftKey?`l${liftKey}`:"idle"} className={"agent-card "+(liftKey?"card-lift":"")}
      style={{flex:1,background:"var(--panel)",border:"1px solid var(--line)",borderRadius:20,padding:"22px 24px",boxShadow:"var(--shadow-md)",position:"relative",overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div className="display" style={{fontSize:19,fontWeight:600,letterSpacing:"-0.01em",marginBottom:3}}>{agent.name}</div>
          <div style={{fontSize:13.5,color:"var(--muted)"}}>{agent.tag}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:7,background:"var(--bg)",borderRadius:20,padding:"5px 11px",border:"1px solid var(--line)"}}>
          <span className="live-pulse" style={{width:7,height:7,borderRadius:"50%",background:"var(--green)"}} />
          <span style={{fontSize:11.5,fontWeight:600,color:"var(--cream-2)"}}>Live</span>
        </div>
      </div>
      <div style={{display:"flex",gap:10}}>
        <Stat label="Per call" value={agent.price.toFixed(2)+" USDC"} />
        <Stat label="Delivery" value={agent.sla} />
        <Stat label="Orders" value={orders} accent />
      </div>
    </div>
  );
}
function Stat({label,value,accent}){
  return (
    <div style={{flex:1,background:"var(--bg)",borderRadius:12,padding:"11px 13px",border:"1px solid var(--line)"}}>
      <div style={{fontSize:11,color:"var(--muted-2)",marginBottom:4,fontWeight:500}}>{label}</div>
      <div className="display" style={{fontSize:15,fontWeight:600,color:accent?"var(--ember)":"var(--cream)"}}>{value}</div>
    </div>
  );
}
function LedgerRow({order,isNew}){
  const a=AGENTS[order.agentId];
  return (
    <div className={isNew?"row-in":""} style={{padding:"2px 0"}}>
      <div className={isNew?"row-flash":""} style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:18,alignItems:"center",padding:"14px 20px",borderRadius:12}}>
        <div style={{display:"flex",alignItems:"center",gap:12,minWidth:0}}>
          <span style={{width:9,height:9,borderRadius:"50%",background:a.dot,flexShrink:0,boxShadow:`0 0 8px ${a.dot}`}} />
          <span style={{fontSize:14,color:"var(--cream)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{order.text}</span>
        </div>
        <span style={{fontSize:13,color:"var(--muted)",fontWeight:500}}>{a.name}</span>
        <span className="display" style={{fontSize:13,color:"var(--cream-2)",minWidth:66,textAlign:"right"}}>{a.price.toFixed(2)} USDC</span>
        <span style={{display:"flex",alignItems:"center",gap:6,color:"var(--green)",fontSize:12.5,fontWeight:600,minWidth:74,justifyContent:"flex-end"}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="var(--green)" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>
          Settled
        </span>
      </div>
    </div>
  );
}

function App(){
  const [input,setInput]=useState("");
  const [orders,setOrders]=useState([]);
  const [flying,setFlying]=useState([]);
  const [rings,setRings]=useState([]);
  const [lift,setLift]=useState({agentId:null,key:0});
  const [counts,setCounts]=useState({verimath:AGENTS.verimath.base,chainguard:AGENTS.chainguard.base});
  const [stats,setStats]=useState({total:53,volume:4.02});
  const inputRef=useRef(null),vmRef=useRef(null),cgRef=useRef(null),liftC=useRef(0);

  const getOrigin=()=>{const el=inputRef.current;if(!el)return{x:120,y:120};const r=el.getBoundingClientRect();return{x:r.left+28,y:r.top+r.height/2};};
  const getTarget=(id)=>{const el=id==="verimath"?vmRef.current:cgRef.current;if(!el)return{x:240,y:240};const r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};};

  const submit=useCallback((text,forced)=>{
    if(!text.trim())return;
    const agentId=forced||pickAgent(text);seq+=1;
    setFlying(f=>[...f,{id:rid()+"-"+seq,text:text.trim(),agentId,num:seq,origin:getOrigin(),target:getTarget(agentId)}]);
  },[]);
  const arrive=useCallback((pid)=>{
    setFlying(prev=>{
      const p=prev.find(x=>x.id===pid);
      if(p){
        liftC.current+=1;setLift({agentId:p.agentId,key:liftC.current});
        setRings(r=>[...r,{id:p.id,point:p.target,color:"#E8913C"}]);
        setTimeout(()=>setRings(r=>r.filter(x=>x.id!==p.id)),670);
        setOrders(o=>[{id:p.id,text:p.text,agentId:p.agentId},...o].slice(0,9));
        setCounts(c=>({...c,[p.agentId]:c[p.agentId]+1}));
        setStats(s=>({total:s.total+1,volume:+(s.volume+AGENTS[p.agentId].price).toFixed(2)}));
      }
      return prev.filter(x=>x.id!==pid);
    });
  },[]);

  useEffect(()=>{
    const t1=setTimeout(()=>submit("prime-proof 104729","verimath"),1400);
    const t2=setTimeout(()=>submit("audit 0x4f2a…9e01 for reentrancy","chainguard"),3800);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[]);

  return (
    <div style={{minHeight:"100vh",position:"relative"}}>
      {/* hero atmospheric photo */}
      <div style={{position:"absolute",top:0,right:0,width:"58%",height:640,zIndex:0,pointerEvents:"none"}}>
        <div className="hero-photo" style={{width:"100%",height:"100%",backgroundImage:`url(${IMG.dispatcher})`,backgroundSize:"cover",backgroundPosition:"center 30%",opacity:0.5}} />
        <div style={{position:"absolute",inset:0,background:"linear-gradient(90deg,var(--bg) 0%,rgba(14,11,8,0.6) 30%,transparent 70%)"}} />
        <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,transparent 55%,var(--bg) 100%)"}} />
      </div>

      <div style={{position:"relative",zIndex:10,maxWidth:960,margin:"0 auto",padding:"0 28px"}}>
        {/* nav */}
        <header className="fade-up" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"28px 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:11}}>
            <div style={{width:34,height:34,borderRadius:9,background:"var(--panel-2)",border:"1px solid var(--line-2)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M4 6l6 6-6 6" stroke="var(--cream)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M12 6l6 6-6 6" stroke="var(--ember)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            <span className="display" style={{fontWeight:700,fontSize:19,letterSpacing:"-0.02em"}}>Dispatch</span>
          </div>
          <div style={{display:"flex",gap:26,fontSize:13.5,color:"var(--muted)",fontWeight:500}}>
            <span><b className="display" style={{color:"var(--cream)",fontWeight:600}}>{stats.total}</b> settled</span>
            <span><b className="display" style={{color:"var(--cream)",fontWeight:600}}>{stats.volume.toFixed(2)}</b> USDC routed</span>
          </div>
        </header>

        {/* hero */}
        <section style={{padding:"60px 0 54px"}}>
          <div className="fade-up d1" style={{display:"inline-flex",alignItems:"center",gap:8,background:"var(--panel)",border:"1px solid var(--line)",borderRadius:20,padding:"6px 14px",marginBottom:26}}>
            <span className="live-pulse" style={{width:6,height:6,borderRadius:"50%",background:"var(--green)"}} />
            <span style={{fontSize:12.5,color:"var(--cream-2)",fontWeight:500}}>Routing to 2 live agents on CROO</span>
          </div>
          <h1 className="display fade-up d1" style={{fontSize:58,fontWeight:700,letterSpacing:"-0.035em",lineHeight:1.02,marginBottom:22,maxWidth:640}}>
            Say what you need.<br/>We decide who does it.
          </h1>
          <p className="fade-up d2" style={{fontSize:18,lineHeight:1.55,color:"var(--cream-2)",maxWidth:460,marginBottom:36}}>
            Dispatch routes your request to the right live agent on CROO, pays for it, and returns the result.
          </p>

          <form className="fade-up d3" onSubmit={e=>{e.preventDefault();submit(input);setInput("");}} style={{display:"flex",gap:12,maxWidth:600}}>
            <div className="field" style={{flex:1,display:"flex",alignItems:"center",background:"var(--panel)",border:"1.5px solid var(--line-2)",borderRadius:14,padding:"0 18px"}}>
              <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} placeholder="verify that 7919 is prime"
                style={{flex:1,border:"none",outline:"none",background:"transparent",padding:"17px 0",fontSize:15,color:"var(--cream)",fontFamily:"inherit"}} />
            </div>
            <button type="submit" className="btn-press display" style={{background:"var(--ember)",color:"#1a1207",border:"none",borderRadius:14,padding:"0 28px",fontSize:15,fontWeight:600,cursor:"pointer"}}>
              Dispatch
            </button>
          </form>
        </section>

        {/* routes to */}
        <section style={{marginBottom:40}}>
          <div style={{fontSize:12.5,color:"var(--muted-2)",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:14}}>Routes to</div>
          <div style={{display:"flex",gap:16}}>
            <AgentCard agent={AGENTS.verimath} orders={counts.verimath} liftKey={lift.agentId==="verimath"?lift.key:null} cardRef={vmRef} />
            <AgentCard agent={AGENTS.chainguard} orders={counts.chainguard} liftKey={lift.agentId==="chainguard"?lift.key:null} cardRef={cgRef} />
          </div>
        </section>

        {/* ledger */}
        <section style={{marginBottom:70}}>
          <div style={{fontSize:12.5,color:"var(--muted-2)",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:14}}>Live ledger</div>
          <div style={{background:"var(--panel)",border:"1px solid var(--line)",borderRadius:18,padding:8,boxShadow:"var(--shadow-md)"}}>
            {orders.length===0
              ? <div style={{padding:"44px",textAlign:"center",color:"var(--muted-2)",fontSize:14}}>Nothing in transit yet.</div>
              : orders.map((o,i)=><LedgerRow key={o.id} order={o} isNew={i===0} />)
            }
          </div>
        </section>
      </div>

      {/* footer with CRT */}
      <footer style={{position:"relative",zIndex:10,borderTop:"1px solid var(--line)",background:"var(--bg)"}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"44px 28px 48px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:40,flexWrap:"wrap"}}>
          {/* CRT unit */}
          <div style={{display:"flex",alignItems:"flex-end",gap:24}}>
            <CRT />
            <div style={{paddingBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:10}}>
                <div style={{width:26,height:26,borderRadius:7,background:"var(--panel-2)",border:"1px solid var(--line-2)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <path d="M4 6l6 6-6 6" stroke="var(--cream)" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/>
                    <path d="M12 6l6 6-6 6" stroke="var(--ember)" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </div>
                <span className="display" style={{fontWeight:700,fontSize:16}}>Dispatch</span>
              </div>
              <div style={{fontSize:12.5,color:"var(--muted-2)",maxWidth:220,lineHeight:1.5}}>The routing layer for the agent economy. Built on CROO CAP.</div>
            </div>
          </div>
          {/* social */}
          <div style={{display:"flex",gap:12}}>
            <a href="#" className="social" style={{display:"flex",alignItems:"center",justifyContent:"center",width:44,height:44,borderRadius:11,border:"1px solid var(--line-2)",color:"var(--cream-2)",textDecoration:"none"}} aria-label="GitHub">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.38.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.21.09 1.85 1.24 1.85 1.24 1.07 1.84 2.81 1.31 3.5 1 .11-.78.42-1.31.76-1.61-2.67-.3-5.47-1.34-5.47-5.96 0-1.32.47-2.39 1.24-3.23-.13-.3-.54-1.53.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 016 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.65.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.23 0 4.63-2.8 5.65-5.48 5.95.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.56 22.3 24 17.8 24 12.5 24 5.87 18.63.5 12 .5z"/></svg>
            </a>
            <a href="#" className="social" style={{display:"flex",alignItems:"center",justifyContent:"center",width:44,height:44,borderRadius:11,border:"1px solid var(--line-2)",color:"var(--cream-2)",textDecoration:"none"}} aria-label="X">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.9 1.15h3.68l-8.04 9.19L24 22.85h-7.41l-5.8-7.58-6.64 7.58H.46l8.6-9.83L0 1.15h7.6l5.24 6.93 6.06-6.93zm-1.29 19.5h2.04L6.48 3.24H4.29l13.32 17.41z"/></svg>
            </a>
          </div>
        </div>
      </footer>

      {flying.map(p=><Packet key={p.id} packet={p} onArrive={arrive} />)}
      {rings.map(r=><Ring key={r.id} point={r.point} color={r.color} />)}
    </div>
  );
}

function CRT(){
  return (
    <div style={{position:"relative",width:230,height:186,background:"linear-gradient(160deg,#2a2320,#171310)",borderRadius:"18px 18px 14px 14px",padding:16,boxShadow:"var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.05)",border:"1px solid #3a3028"}}>
      <div style={{position:"relative",width:"100%",height:"100%",borderRadius:10,overflow:"hidden",background:"#1a0f03",boxShadow:"inset 0 0 30px rgba(0,0,0,0.8)"}}>
        <div className="crt-flicker" style={{position:"absolute",inset:0,backgroundImage:`url(${IMG.crt})`,backgroundSize:"cover",backgroundPosition:"center",filter:"saturate(1.15) brightness(1.05)"}} />
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.5) 100%)"}} />
        <div style={{position:"absolute",inset:0,backgroundImage:"repeating-linear-gradient(0deg,rgba(0,0,0,0.15) 0px,rgba(0,0,0,0.15) 1px,transparent 1px,transparent 3px)",pointerEvents:"none"}} />
        <div style={{position:"absolute",inset:0,boxShadow:"inset 0 0 24px rgba(232,145,60,0.15)"}} />
      </div>
      <div style={{position:"absolute",bottom:6,right:14,display:"flex",gap:6,alignItems:"center"}}>
        <span className="live-pulse" style={{width:5,height:5,borderRadius:"50%",background:"var(--ember)"}} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
